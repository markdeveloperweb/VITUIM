name: Build TWA APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init Bubblewrap
        run: |
          bubblewrap init \
            --manifest https://markdeveloperweb.github.io/vitium/manifest.json \
            --directory twa-project
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Build APK
        run: |
          cd twa-project
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: vitium-apk
          path: twa-project/app-release-unsigned.apk
